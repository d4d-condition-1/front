# 서버에서 소스를 직접 빌드해 실행하는 compose 파일.
# 배포 웹훅 서버가 deploy/deploy.sh 를 실행하면
# git 최신화 후 `docker compose up -d --build` 로 이 파일을 사용한다.

services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: d4d-front:latest
    container_name: d4d-front
    restart: unless-stopped
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      - NODE_ENV=production
    networks:
      docker_default:
        ipv4_address: 172.23.0.4
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))",
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

# 이미 존재하는 외부 네트워크 docker_default 에 고정 IP로 연결한다.
# 전제: 이 네트워크가 172.23.0.0/16 대역으로 만들어져 있어야 172.23.0.4 할당이 가능하다.
#   확인:  docker network inspect docker_default
#   없으면: docker network create --subnet 172.23.0.0/16 docker_default
networks:
  docker_default:
    external: true
